name: build

on:
  push:
    branches: [main, "mc/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test common
        run: ./gradlew :common:test
      - name: Validate opt-in E2E harness
        run: |
          bash -n scripts/run-real-client-e2e.sh
          python3 - <<'PY'
          import ast, pathlib
          ast.parse(pathlib.Path("scripts/e2e-model-fixture.py").read_text(encoding="utf-8"))
          PY
      - name: Build loaders
        run: ./gradlew :fabric:build :neoforge:build
      - uses: actions/upload-artifact@v4
        with:
          name: tomewisp-26.2
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
          if-no-files-found: error
