name: Quality

on:
  push:
    branches:
      - main
      - "mc/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Java 25 / Minecraft 26.2
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Validate automation sources
        run: |
          bash -n scripts/*.sh
          python3 -m py_compile scripts/*.py

      - name: Run clean test and loader build gate
        run: ./gradlew clean :common:test :fabric:build :neoforge:build

      - name: Verify Phase 4 package
        run: ./scripts/verify-phase4-package.sh

      - name: Verify SQLite packaging
        run: ./scripts/verify-sqlite-packaging.sh

      - name: Verify distribution
        run: ./scripts/verify-distribution.sh
